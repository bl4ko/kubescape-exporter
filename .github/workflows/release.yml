name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push image
    uses: bl4ko/shared-actions/.github/workflows/build_image.yml@eeb43f1c9e138a723f0e5cb940f56ee40fea62c8 # main
    with:
      tags: "ghcr.io/bl4ko/kubescape-exporter:${{ github.ref_name }},ghcr.io/bl4ko/kubescape-exporter:latest"
      platform: "linux/amd64"
      runs-on: "ubuntu-latest"
